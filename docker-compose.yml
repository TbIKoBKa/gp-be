services:
  api:
    build: .
    container_name: gp_be
    restart: unless-stopped
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-4000}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
